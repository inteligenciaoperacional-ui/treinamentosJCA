<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grupo JCA — Login</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<div class="bg-stripes"></div>
<div class="bg-glow"></div>

<div class="login-container">

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <a href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M15 19l-7-7 7-7"/></svg>
      Início
    </a>
    <span>›</span>
    <span id="breadcrumbCompany" style="color:var(--col-text-2)">Login</span>
  </div>

  <!-- Card principal -->
  <div class="login-card">

    <!-- Stripe colorida no topo -->
    <div class="login-card-stripe" id="cardStripe"></div>

    <!-- Header com logo da empresa -->
    <div class="login-card-header">
      <div class="company-badge" id="companyBadge" style="background:var(--col-orange)">
        JCA
      </div>
      <div class="login-heading">
        <h2 id="loginTitle">Acessar Plataforma</h2>
        <p id="loginSubtitle">Faça login com seu e-mail corporativo</p>
      </div>
    </div>

    <!-- Body -->
    <div class="login-card-body">

      <!-- Erro -->
      <div class="error-box" id="errorBox"></div>

      <!-- Botão Google -->
      <button class="btn-google" id="btnGoogle" onclick="handleGoogleLogin()">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Entrar com Google
      </button>

      <p class="google-hint">
        Use o e-mail corporativo cadastrado.<br>
        O acesso é validado automaticamente.
      </p>

    </div>
  </div>

  <div class="login-footer">
    Problemas para acessar?
    <a href="mailto:suporte@grupojca.com.br">Contate o suporte</a>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script type="module" src="js/login.js"></script>
</body>
</html>
